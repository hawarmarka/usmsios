services:
  usms:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_DIR: /app/public
      DATA_DIR: /app/data
      MAX_PAYLOAD_BYTES: 26214400
      MAX_UPLOAD_BYTES: 10485760
      TURN_URLS: ${TURN_URLS:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
    volumes:
      - usms_data:/app/data
volumes:
  usms_data:
