workflows:
  usms-ios-check:
    name: USMS iOS Check Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.hawar.usms
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Prepare Capacitor iOS project
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Patch iOS permissions
        script: |
          bash scripts/prepare-ios.sh

      - name: Build iOS simulator app
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/**/*.app
